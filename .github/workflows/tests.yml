name: tests

on:
  push:
  pull_request:

jobs:
  public-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run public checks
        run: make public-check
