<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">Phyloop physics-AI surrogate qualification banner</title>
  <desc id="desc">A restrained Phyloop-branded banner for the solver-validated physics-AI surrogate qualification repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061332"/>
      <stop offset="0.55" stop-color="#071b4a"/>
      <stop offset="1" stop-color="#0b2a72"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#eaf0fb"/>
      <stop offset="0.52" stop-color="#6fa4ff"/>
      <stop offset="1" stop-color="#0048f0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" rx="0" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#9fb0d6" stroke-width="1">
    <path d="M0 64H1280M0 128H1280M0 192H1280M0 256H1280"/>
    <path d="M96 0V320M192 0V320M288 0V320M384 0V320M480 0V320M576 0V320M672 0V320M768 0V320M864 0V320M960 0V320M1056 0V320M1152 0V320"/>
  </g>
  <g transform="translate(92 86)" filter="url(#softGlow)">
    <path d="M24 74C55 18 104 18 148 74C192 130 241 130 272 74" fill="none" stroke="url(#loop)" stroke-width="18" stroke-linecap="round"/>
    <path d="M24 74C55 130 104 130 148 74C192 18 241 18 272 74" fill="none" stroke="url(#loop)" stroke-width="18" stroke-linecap="round" opacity="0.78"/>
    <circle cx="148" cy="74" r="9" fill="#eaf0fb"/>
  </g>
  <g transform="translate(420 82)">
    <text x="0" y="0" fill="#8fb7ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0.22em">PHYLOOP / PL-WP-002</text>
    <text x="0" y="62" fill="#f3f7ff" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="650">Physics-AI Surrogate Qualification</text>
    <text x="0" y="106" fill="#b8c6e6" font-family="Inter, Arial, sans-serif" font-size="23">Solver validation · field uncertainty · OOD evaluation · solver fallback</text>
    <g transform="translate(0 145)" fill="none" stroke="#6fa4ff" stroke-width="2">
      <path d="M0 0H164"/>
      <circle cx="190" cy="0" r="5" fill="#6fa4ff" stroke="none"/>
      <path d="M216 0H430"/>
    </g>
  </g>
</svg>
